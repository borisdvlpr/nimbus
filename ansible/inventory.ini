[nimbus]
node ansible_host=nimbus

[nimbus:vars]
ansible_user=nimbus
ansible_python_interpreter=/usr/bin/python3

# ansible_host is the node's Tailscale MagicDNS name (or its 100.x tailnet IP).
# Access is over Tailscale SSH (identity-based) — no SSH key or password is configured.
# Your workstation must be on the same tailnet, and the ACL must allow SSH to tag:nimbus.
# If Tailscale SSH host-key prompts block automation, export ANSIBLE_HOST_KEY_CHECKING=False
# (or add the node's host key to known_hosts on first connect).
