apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: metrics-server
  namespace: flux-system
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/metrics-server/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: metrics-server
      version: "3.13.1"           # app v0.8.1. Pin; bump deliberately.
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Appended to the chart's defaultArgs. Required on Kind: the kubelet serving
    # certificate is self-signed and not part of the cluster CA, so without this
    # metrics-server cannot scrape the kubelet and `kubectl top` returns errors.
    args:
      - --kubelet-insecure-tls
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        memory: 96Mi
