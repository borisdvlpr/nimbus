apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: web            # the HTTP listener on the shared Gateway
  hostnames:
    - grafana.nimbus              # add to tailnet DNS, or use a Host header
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kube-prometheus-stack-grafana   # Grafana Service (<release>-grafana)
          port: 80
